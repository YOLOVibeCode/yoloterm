name: Contracts

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'shared/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'shared/**'
      - '.github/workflows/contracts.yml'

jobs:
  lint-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js (for JSON linting)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate fixture JSON
        run: |
          echo "Validating fixture JSON files..."
          # Find all JSON files in contracts/fixtures and validate syntax
          find contracts/fixtures -name "*.json" -type f | while read file; do
            echo "Checking $file..."
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✅ All fixture JSON files are valid"
      
      - name: Validate theme JSON
        run: |
          echo "Validating theme JSON files..."
          find contracts/themes -name "*.json" -type f | while read file; do
            echo "Checking $file..."
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✅ All theme JSON files are valid"
      
      - name: Check contracts structure
        run: |
          echo "Checking contracts directory structure..."
          required_dirs=(
            "contracts/fixtures/colors"
            "contracts/fixtures/layout"
            "contracts/fixtures/restore"
            "contracts/themes"
            "contracts/schema"
            "shared/shell-plugins"
          )
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing required directory: $dir"
              exit 1
            fi
          done
          echo "✅ All required directories present"
  
