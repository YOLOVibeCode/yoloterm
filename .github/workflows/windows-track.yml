name: Windows Track

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'contracts/**'
      - 'shared/**'
      - 'spikes/s2-wtcontrol/**'
      - '.github/workflows/windows-track.yml'
  pull_request:
    branches: [main]
    paths:
      - 'windows/**'
      - 'contracts/**'
      - 'shared/**'
      - 'spikes/s2-wtcontrol/**'
      - '.github/workflows/windows-track.yml'

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            windows/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: Restore dependencies
        run: |
          cd windows
          dotnet restore YOLOTerm.sln
      
      - name: Build solution
        run: |
          cd windows
          dotnet build YOLOTerm.sln -c Release --no-restore
      
      - name: Build pty-probe
        run: |
          cd windows
          dotnet build pty-probe/pty-probe.csproj -c Release --no-restore
      
      - name: Run tests
        run: |
          cd windows
          dotnet test YOLOTerm.Tests/YOLOTerm.Tests.csproj -c Release --no-build --verbosity normal
      
      - name: Package app
        if: success()
        run: |
          cd windows
          dotnet publish YOLOTerm.App/YOLOTerm.App.csproj -c Release -o publish/
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build
          path: |
            windows/publish/
            windows/pty-probe/bin/Release/net9.0/
      
      - name: Build S2 spike (if exists)
        continue-on-error: true
        run: |
          if (Test-Path spikes/s2-wtcontrol/*.csproj) {
            cd spikes/s2-wtcontrol
            dotnet restore
            dotnet build -c Release
          }

