name: macOS Track CI

on:
  push:
    branches: [main]
    paths:
      - 'macos/**'
      - 'contracts/**'
      - '.github/workflows/macos-track.yml'
  pull_request:
    paths:
      - 'macos/**'
      - 'contracts/**'
      - '.github/workflows/macos-track.yml'

jobs:
  build-and-test:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      
      - name: Build
        working-directory: macos
        run: swift build
      
      - name: Run Tests (including GATE 1 color corpus)
        working-directory: macos
        run: swift test
      
      - name: Build pty-probe
        working-directory: macos
        run: swift build --product pty-probe
      
      - name: Build YOLOTerm app
        working-directory: macos
        run: swift build --product YOLOTerm
      
      - name: Verify Metal renderer availability
        working-directory: macos
        run: |
          if [ -f .build/debug/YOLOTerm ]; then
            echo "✅ YOLOTerm executable built successfully"
          else
            echo "❌ YOLOTerm executable not found"
            exit 1
          fi
